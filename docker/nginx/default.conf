server {
    listen 80;
    listen 443 ssl;
    server_name rpgfit.local localhost;
    root /var/www/html/public;
    index index.php;

    ssl_certificate /etc/nginx/ssl/rpgfit.local.crt;
    ssl_certificate_key /etc/nginx/ssl/rpgfit.local.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location /uploads/ {
        alias /var/www/html/public/uploads/;
        expires 7d;
        access_log off;
    }

    location /media/cache/ {
        alias /var/www/html/public/media/cache/;
        expires 30d;
        access_log off;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
