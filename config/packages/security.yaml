security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Test-harness role hierarchy (Phase 5). Each tier inherits the one below,
    # so a ROLE_SUPERADMIN implicitly carries ROLE_ADMIN, ROLE_TESTER, ROLE_USER.
    role_hierarchy:
        ROLE_TESTER: ROLE_USER
        ROLE_ADMIN: ROLE_TESTER
        ROLE_SUPERADMIN: ROLE_ADMIN

    providers:
        app_user_provider:
            entity:
                class: App\Domain\User\Entity\User
                property: login
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        admin:
            pattern: ^/admin
            security: false
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: login
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            stateless: true

    access_control:
        # Public marketing landing (must precede the ^/api catch-all).
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/healthz$, roles: PUBLIC_ACCESS }
        - { path: ^/assets, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/registration, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/oauth, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/levels/table, roles: PUBLIC_ACCESS }
        - { path: ^/api/mobs, roles: PUBLIC_ACCESS }
        # Portal reads are public; the dynamic-create endpoint still requires JWT
        # because it's guarded at the controller level via #[IsGranted].
        - { path: ^/api/portals, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
