# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/User/Entity/'
            - '../src/Domain/User/Enum/'
            - '../src/Domain/User/ValueObject/'
            - '../src/Domain/Character/Entity/'
            - '../src/Domain/Character/Enum/'
            - '../src/Domain/Training/Entity/'
            - '../src/Domain/Skill/Entity/'
            - '../src/Domain/Inventory/Entity/'
            - '../src/Domain/Inventory/Enum/'
            - '../src/Domain/Media/Entity/'
            - '../src/Domain/Config/Entity/'
            - '../src/Domain/Mob/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    admin.user:
        class: App\Admin\UserAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\User\Entity\User, manager_type: orm, label: Users, group: users }

    admin.character_stats:
        class: App\Admin\CharacterStatsAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Character\Entity\CharacterStats, manager_type: orm, label: Character Stats, group: users }

    admin.workout_category:
        class: App\Admin\WorkoutCategoryAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Training\Entity\WorkoutCategory, manager_type: orm, label: Workout Categories, group: training }

    admin.exercise_type:
        class: App\Admin\ExerciseTypeAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Training\Entity\ExerciseType, manager_type: orm, label: Exercise Types, group: training }

    admin.exercise_stat_reward:
        class: App\Admin\ExerciseStatRewardAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Training\Entity\ExerciseStatReward, manager_type: orm, label: Stat Rewards, group: training }

    admin.experience_log:
        class: App\Admin\ExperienceLogAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Character\Entity\ExperienceLog, manager_type: orm, label: Experience Logs, group: logs }

    admin.workout_log:
        class: App\Admin\WorkoutLogAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Training\Entity\WorkoutLog, manager_type: orm, label: Workout Logs, group: logs }

    admin.skill:
        class: App\Admin\SkillAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Skill\Entity\Skill, manager_type: orm, label: Skills, group: skills }

    admin.skill_stat_bonus:
        class: App\Admin\SkillStatBonusAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Skill\Entity\SkillStatBonus, manager_type: orm, label: Skill Bonuses, group: skills }

    admin.item_catalog:
        class: App\Admin\ItemCatalogAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Inventory\Entity\ItemCatalog, manager_type: orm, label: Item Catalog, group: inventory }

    admin.item_stat_bonus:
        class: App\Admin\ItemStatBonusAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Inventory\Entity\ItemStatBonus, manager_type: orm, label: Item Bonuses, group: inventory }

    admin.user_inventory:
        class: App\Admin\UserInventoryAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Inventory\Entity\UserInventory, manager_type: orm, label: User Inventory, group: inventory }

    admin.user_skill:
        class: App\Admin\UserSkillAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Skill\Entity\UserSkill, manager_type: orm, label: User Skills, group: skills }

    admin.user_training_preference:
        class: App\Admin\UserTrainingPreferenceAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\User\Entity\UserTrainingPreference, manager_type: orm, label: Training Preferences, group: users }

    admin.linked_account:
        class: App\Admin\LinkedAccountAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\User\Entity\LinkedAccount, manager_type: orm, label: Linked Accounts, group: users }

    admin.game_setting:
        class: App\Admin\GameSettingAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Config\Entity\GameSetting, manager_type: orm, label: Game Settings, group: config }

    admin.media_file:
        class: App\Admin\MediaFileAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Media\Entity\MediaFile, manager_type: orm, label: Media Files, group: media }

    admin.mob:
        class: App\Admin\MobAdmin
        tags:
            - { name: sonata.admin, model_class: App\Domain\Mob\Entity\Mob, manager_type: orm, label: Mobs, group: mobs }

    App\Application\Media\Service\MediaUploadService:
        arguments:
            $uploadDir: '%kernel.project_dir%/public/uploads'
